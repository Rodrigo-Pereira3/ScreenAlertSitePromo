<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Alert | Admin Panel</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
</head>

<body class="bg-light">

    <!-- TOP BAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">

            <!-- Hamburger button -->
            <button
                class="btn btn-outline-light"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#adminSidebar"
                aria-controls="adminSidebar"
                aria-label="Toggle admin menu"
            >
                ☰
            </button>

            <span class="navbar-brand mb-0 h1">
                Screen Alert Admin
            </span>

        </div>
    </nav>

    <!-- SIDEBAR (OFFCANVAS) -->
    <div 
        class="offcanvas offcanvas-start"
        tabindex="-1"
        id="adminSidebar"
        aria-labelledby="adminSidebarLabel"
    >

        <!-- Sidebar header -->
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="adminSidebarLabel">
                Admin Menu
            </h5>
            <button 
                type="button" 
                class="btn-close"
                data-bs-dismiss="offcanvas"
                aria-label="Close menu"
            ></button>
        </div>

        <!-- Sidebar body -->
        <div class="offcanvas-body p-0">

            <div class="list-group list-group-flush">

                <a href="dashboard.html" class="list-group-item list-group-item-action active">
                    Dashboard
                </a>

                <a href="users.html" class="list-group-item list-group-item-action">
                    Users
                </a>

                <a href="patients.html" class="list-group-item list-group-item-action">
                    Patients
                </a>

                <a href="devices.html" class="list-group-item list-group-item-action">
                    Devices
                </a>

                <a href="logs.html" class="list-group-item list-group-item-action">
                    Logs
                </a>

                <a href="schedules.html" class="list-group-item list-group-item-action">
                    Schedules
                </a>


            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="container mt-4" role="main">
        <h1 class="h3 mb-2">Dashboard</h1>
        <p class="text-muted">
            Administrative overview of the Screen Alert system.
        </p>
    </main>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
